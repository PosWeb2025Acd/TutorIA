services:
  rag:
    build: ./rag
    container_name: tutoria_rag
    hostname: rag-tutoria
    ports:
      - "5000:5000"
    volumes:
      - ./rag:/app
      - ./db:/app/db
    depends_on:
      - db
    env_file:
      - .env
    networks:
      - tutoria

  judge:
    build: ./judge
    container_name: tutoria_rag_judge
    restart: always
    hostname: rag-judge-tutoria
    volumes:
      - ./judge:/app
      - ./db:/app/db
    depends_on:
      - db
      - ollama
    env_file:
      - .env
    networks:
      - tutoria

  frontend:
    build: ./app
    container_name: tutoria_frontend
    ports:
      - "3000:3000"
    volumes:
      - ./app:/app
      - ./app/node_modules:/app/node_modules
    networks:
      - tutoria

  db:
    image: postgres:17.6-alpine3.21
    container_name: tutoria_db
    restart: always
    environment:
      POSTGRES_USER: $DB_USER
      POSTGRES_PASSWORD: $DB_PASSWORD
      POSTGRES_DB: $DB_NAME
    ports:
      - "5432:5432"
    volumes:
      - ./db-scripts:/docker-entrypoint-initdb.d
      - db:/var/lib/postgresql/data
    networks:
      - tutoria

  ollama:
    image: ollama/ollama:latest
    container_name: tutoria_ollama
    hostname: ollama-tutoria
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    networks:
      - tutoria

volumes:
  db:
  ollama_data:

networks:
  tutoria:
